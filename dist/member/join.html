										document.getElementById("domainSelect").addEventListener("change", function() {
											var selectedDomain = this.value; // 선택된 이메일 도메인

											// '직접입력'이 아닌 다른 값이 선택되면 'email_domain' 필드에 값 자동 입력
											if (selectedDomain !== "직접입력") {
												emailDomainField.value = selectedDomain; // '직접입력'이 아니면 선택한 값 입력
											} else {
												// '직접입력'을 선택하면 'email_domain' 필드를 비워두거나 사용자가 입력하도록 할 수 있음
												emailDomainField.value = ''; // 사용자가 직접 입력할 수 있도록 빈 칸으로 설정
											}
										});
