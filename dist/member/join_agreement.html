$(function(){
    $("#wrap").addClass("member");

    // 회원가입 약관동의 전체체크
    var JoinAllChecked = $(".sub_agree .agree_cont input[type='checkbox']").length;
    var JoinCheckedCnt = $(".sub_agree .agree_cont input[type='checkbox']:checked").length;

    // 전체선택
    $(".sub_agree #join_all_agree").click(function() {
        var chk = $(this).is(":checked");
        $(".sub_agree .agree_cont input[type='checkbox']").prop('checked', chk);
    });

    // 개별 체크박스 상태에 따라 전체선택 체크박스 업데이트
    $(".sub_agree .agree_cont input[type='checkbox']").on("click", function(){
        var JoinCheckedCnt = $(".sub_agree .agree_cont input[type='checkbox']:checked").length;
        $(".sub_agree #join_all_agree").prop("checked", JoinAllChecked === JoinCheckedCnt);
    });

    // toggle 기능
    $('.sub_agree_box .agree_cont .view_cont').click(function(){
        $(this).toggleClass('on').parents().siblings('.agree_box').stop().slideToggle('slow');
    });

    // **다음단계 버튼 클릭 시 필수 약관 체크 여부 확인**
    $(".btn_point").click(function(event) {
        var isAgree1Checked = $("#agree").is(":checked");      // 이용약관 (필수)
        var isAgree2Checked = $("#agree2").is(":checked");     // 개인정보 수집 및 이용 (필수)

        if (!isAgree1Checked || !isAgree2Checked) {
            event.preventDefault(); // 페이지 이동 방지
            alert("모든 필수 약관에 동의해야 다음 단계로 진행할 수 있습니다.");
        }
    });
});
