<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-2xl shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">로그인</h2>

    <form id="loginForm" class="space-y-4">
      <input type="text" id="username" name="username" placeholder="아이디" class="w-full px-4 py-2 border rounded-lg" required>
      <input type="password" id="password" name="password" placeholder="비밀번호" class="w-full px-4 py-2 border rounded-lg" required>
      <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">로그인</button>
    </form>

    <p id="loginResult" class="mt-4 text-center text-sm text-gray-600"></p>
  </div>

  <script src="http://localhost:8080/login.js"></script>
</body>
</html>
