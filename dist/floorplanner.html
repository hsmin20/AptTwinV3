<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Floorplanner v0.1</title>
    </head>

    <body style="background:#f2eee5;margin:0;padding:0; ">
        <link rel="stylesheet" href="css/floorplanner.css">

    <div id="panel" class="leftBox" style="width:240px;">

        <br />
        <div class="input-radio"><input type="radio" id="select" name="mode" value="select" checked> <label for="select">Select</label></div>
        <div class="input-radio"><input type="radio" id="drawwall" name="mode" value="drawwall"> <label for="drawwall">Draw Wall</label></div>
        <div class="input-radio"><input type="radio" id="drawfloor" name="mode" value="drawfloor"> <label for="drawfloor">Draw 방Floor</label></div>
        <div class="input-radio"><input type="radio" id="drawfloor2" name="mode" value="drawfloor2"> <label for="drawfloor2">Draw 거실Floor</label></div>
        <div class="input-radio"><input type="radio" id="drawfloor3" name="mode" value="drawfloor3"> <label for="drawfloor3">Draw 화장실Floor</label></div>
        <div class="input-radio"><input type="radio" id="drawfloor4" name="mode" value="drawfloor4"> <label for="drawfloor4">Draw 베란다Floor</label></div>
        <div class="input-radio"><input type="radio" id="drawfloor5" name="mode" value="drawfloor5"> <label for="drawfloor5">Draw 창고Floor</label></div>
        <div class="input-radio"><input type="radio" id="drawdoor" name="mode" value="drawdoor"> <label for="drawdoor">Add 방Door</label></div>
        <div class="input-radio"><input type="radio" id="drawdoor2" name="mode" value="drawdoor2"> <label for="drawdoor2">Add 현관Door</label></div>
        <div class="input-radio"><input type="radio" id="drawwindow" name="mode" value="drawwindow"> <label for="drawwindow">Add 실내Window</label></div>
        <div class="input-radio"><input type="radio" id="drawwindow2" name="mode" value="drawwindow2"> <label for="drawwindow2">Add 베란다Window</label></div>
        <div class="input-radio"><input type="radio" id="addbathtub" name="mode" value="addbathtub"> <label for="addbathtub">Add Bathtub (욕조)</label></div>
        <div class="input-radio"><input type="radio" id="addtoilet" name="mode" value="addtoilet"> <label for="addtoilet">Add Toilet</label></div>
        <div class="input-radio"><input type="radio" id="addbathsink" name="mode" value="addbathsink"> <label for="addbathsink">Add Bathsink</label></div>
        <div class="input-radio"><input type="radio" id="addkitchensink" name="mode" value="addkitchensink"> <label for="addkitchensink">Add Kitchen sink</label></div>
        <div class="input-radio"><input type="radio" id="addlight" name="mode" value="addlight"> <label for="addlight">Add Light (circle)</label></div>
        <div class="input-radio"><input type="radio" id="addlight2" name="mode" value="addlight2"> <label for="addlight2">Add Light (rectangle)</label></div>
        <div class="input-radio"><input type="radio" id="cut" name="mode" value="cut"> <label for="cut">Cut</label></div>
        <br />
        
        <div class="input-radio"><input type="button" id="changedoorhinge" name="changedoorhinge" value="change door hinge"> <label for="changedoorhinge"></label></div>
        <p>Width [<span id="doorWindowWidthScale"></span>] : <span id="doorWindowWidthVal"></span> m</span></p>
        <input type="range" id="doorWindowWidth" step="1" class="range" />
        <br />
        <p>Height [<span id="doorWindowHeightScale"></span>] : <span id="doorWindowHeightVal"></span> m</span></p>
        <input type="range" id="doorWindowHeight" step="1" class="range" />
        <br />

        <div class="input-radio"><input type="button" id="delete" name="delete" value="delete"> <label for="delete"></label></div>
        <div class="input-radio"><input type="button" id="empty" name="empty" value="empty"> <label for="empty"></label></div>
        <br />
        <div class="input-radio"><input type="button" id="export" name="export" value="export"> <label for="export"></label></div>
        <div class="input-radio"><input type="button" id="save" name="save" value="save"> <label for="save"></label></div>
        <div class="input-radio"><input type="button" id="load" name="load" value="load"> <label for="load"></label></div>
        <br />
        <div class="input-radio"><input type="button" id="zoomin" name="zoomin" value="zoom+"><label for="zoomin"></label></div>
        <div class="input-radio"><input type="button" id="zoomout" name="zoomout" value="zoom-"> <label for="zoomout"></label></div>
        <div class="input-radio"><input type="button" id="reset" name="reset" value="reset"> <label for="reset"></label></div>
        <br />
        <div class="input-radio"><input type="button" id="savestate" name="savestate" value="save state manually"> <label for="savestate"></label></div>
        <br />

    </div>
        <script src="apttwinfloorplanner.js"></script>
    </body>
</html>
